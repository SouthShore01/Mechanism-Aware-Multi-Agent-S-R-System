# Experiment — Linear auction aggregation (monotone, incentive-compatible)
# Theoretical claim: monotone → IC; bounded manipulation gain.

data:
  n_items: 500
  n_users: 100
  n_queries: 20
  pool_size: 100

agents:
  relevance:       { bid: 0.4 }
  personalization: { bid: 0.3 }
  diversity:       { bid: 0.2 }
  safety:          { bid: 0.1 }

mechanism:
  aggregation_rule: linear
  compute_payment: true
  top_k: 10

evaluation:
  metrics: [ndcg5, ndcg10, recall10, ild10, mrr]

experiment:
  seed: 42
  name: linear_aggregation
