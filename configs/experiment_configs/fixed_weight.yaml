# Experiment 1 — Fixed-weight baseline (no auction mechanism)
# Control condition: manually tuned weights, no incentive structure.

data:
  n_items: 500
  n_users: 100
  n_queries: 20
  pool_size: 100

agents:
  relevance:       { bid: 0.4 }
  personalization: { bid: 0.3 }
  diversity:       { bid: 0.2 }
  safety:          { bid: 0.1 }

# Fixed weights used for simple linear combination (no bid normalization)
fixed_weights:
  relevance:       0.4
  personalization: 0.3
  diversity:       0.2
  safety:          0.1

evaluation:
  top_k: 10
  metrics: [ndcg5, ndcg10, recall10, ild10, mrr]

experiment:
  seed: 42
  name: fixed_weight_baseline
